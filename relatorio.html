<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MigraLog — Relatório de Crises de Enxaqueca</title>
  <!-- title updated by script below based on lang -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
  :root{
    --paper:#F6F3EC;
    --paper-2:#FBFAF5;
    --ink:#23251F;
    --ink-soft:#6E6C60;
    --ink-faint:#9C9A8C;
    --line:#E1DBCC;
    --line-soft:#ECE7DA;
    --brand:#0F5C57;
    --brand-deep:#0A3F3B;
    --brand-soft:#D8E6E2;
    --sev-low:#6FA88E;
    --sev-mid:#E0A458;
    --sev-high:#D08440;
    --sev-max:#C25B47;
    --gold:#A9852F;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#cfc9bb;
    font-family:'Hanken Grotesk',-apple-system,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    padding:32px 0;
  }
  .doc{display:flex;flex-direction:column;align-items:center;gap:28px;}

  .page{
    width:210mm;
    min-height:297mm;
    background:var(--paper);
    padding:17mm 16mm 14mm;
    position:relative;
    box-shadow:0 18px 50px rgba(20,30,28,.22);
    overflow:hidden;
  }
  .page::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,var(--brand-deep),var(--brand) 55%,var(--gold));
  }

  /* tipografia */
  .eyebrow{
    font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--brand);font-weight:700;margin:0 0 6px;
  }
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:33px;line-height:1.05;margin:0;letter-spacing:-.01em;}
  h2{font-family:'Fraunces',serif;font-weight:500;font-size:21px;margin:0;letter-spacing:-.01em;}
  .num{font-variant-numeric:tabular-nums;}

  /* masthead */
  .masthead{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding-bottom:18px;border-bottom:1px solid var(--line);}
  .brandmark{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .brandmark .dot{width:30px;height:30px;border-radius:9px;background:var(--brand);position:relative;flex:none;}
  .brandmark .dot::after{content:"";position:absolute;inset:8px;border:2px solid var(--paper);border-radius:50%;border-top-color:transparent;transform:rotate(35deg);}
  .brandmark span{font-family:'Fraunces',serif;font-weight:600;font-size:15px;letter-spacing:.01em;}
  .masthead .meta{text-align:right;font-size:11.5px;color:var(--ink-soft);line-height:1.7;}
  .masthead .meta b{color:var(--ink);font-weight:600;}
  h1 .sub{display:block;font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:13.5px;color:var(--ink-soft);letter-spacing:0;margin-top:8px;line-height:1.4;}

  /* section header */
  .sec{margin-top:26px;}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;}
  .sec-head h2{white-space:nowrap;}
  .sec-head .rule{flex:1;height:1px;background:var(--line);}
  .sec-head .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper-2);}
  .kpi{padding:15px 14px 16px;border-right:1px solid var(--line-soft);}
  .kpi:last-child{border-right:none;}
  .kpi .label{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:8px;line-height:1.3;min-height:24px;}
  .kpi .value{font-family:'Fraunces',serif;font-size:30px;font-weight:500;line-height:1;color:var(--brand-deep);}
  .kpi .value small{font-size:13px;color:var(--ink-soft);font-weight:400;}
  .kpi .value.text{font-size:18px;line-height:1.1;}

  /* insight callout */
  .insight{margin-top:16px;background:linear-gradient(180deg,var(--brand-soft),#e7efec);border:1px solid #c2d6d1;border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;}
  .insight .icn{width:34px;height:34px;border-radius:9px;background:var(--brand);color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:19px;}
  .insight .body{font-size:12.5px;color:var(--brand-deep);line-height:1.55;}
  .insight .body b{font-weight:700;}
  .insight .body .h{font-weight:700;display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;}

  /* chart grid */
  .charts-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel{border:1px solid var(--line);border-radius:12px;background:var(--paper-2);padding:14px 14px 10px;}
  .panel .pt{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink);margin:0 0 2px;}
  .panel .ps{font-size:10px;color:var(--ink-faint);margin:0 0 8px;}
  svg{display:block;width:100%;height:auto;}

  text{font-family:'Hanken Grotesk',sans-serif;}

  /* month panels */
  .charts-3{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}

  /* hbar list */
  .hbar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:11px;}
  .hbar .hl{width:96px;flex:none;color:var(--ink-soft);text-align:right;}
  .hbar .ht{flex:1;height:13px;background:var(--line-soft);border-radius:7px;overflow:hidden;}
  .hbar .hf{display:block;height:100%;border-radius:7px;background:var(--brand);}
  .hbar .hv{width:18px;flex:none;font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink);}

  /* comparison rows */
  .cmp{margin:0;}
  .cmp-row{padding:12px 0;border-bottom:1px solid var(--line-soft);}
  .cmp-row:last-child{border-bottom:none;}
  .cmp-row .cm-h{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:7px;}
  .cmp-row .cm-h .nm{font-weight:700;color:var(--ink);}
  .cmp-row .cm-h .lg{color:var(--ink-faint);font-size:10px;letter-spacing:.04em;text-transform:uppercase;}
  .cmp-bar{display:flex;align-items:center;gap:9px;margin:4px 0;font-size:10.5px;}
  .cmp-bar .ck{width:54px;flex:none;color:var(--ink-soft);}
  .cmp-bar .ct{flex:1;height:11px;background:var(--line-soft);border-radius:6px;overflow:hidden;}
  .cmp-bar .cf{display:block;height:100%;border-radius:6px;}
  .cmp-bar .cv{width:46px;flex:none;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:4px;}
  thead th{font-size:8.8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;text-align:left;padding:0 8px 8px;border-bottom:1.5px solid var(--brand);}
  tbody td{padding:8px;border-bottom:1px solid var(--line-soft);vertical-align:top;color:var(--ink);}
  tbody td.num{font-variant-numeric:tabular-nums;}
  tbody tr:nth-child(even){background:rgba(15,92,87,.03);}
  .pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:700;font-variant-numeric:tabular-nums;}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:9.5px;color:var(--ink-soft);}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}

  /* footer */
  .foot{position:absolute;left:16mm;right:16mm;bottom:9mm;display:flex;justify-content:space-between;align-items:center;font-size:8.5px;color:var(--ink-faint);border-top:1px solid var(--line-soft);padding-top:7px;}
  .foot b{color:var(--ink-soft);font-weight:600;}

  .disclaimer{margin-top:18px;font-size:9.5px;color:var(--ink-faint);line-height:1.5;border:1px dashed var(--line);border-radius:10px;padding:11px 13px;background:var(--paper-2);}

  /* tabela rolável quando não cabe (base: sem efeito no desktop A4) */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  /* ---- responsivo: abaixo da largura A4 (210mm ≈ 794px) a folha vira fluida ---- */
  @media (max-width:800px){
    body{padding:12px 0;}
    .doc{gap:12px;}
    .page{
      width:100%;min-height:0;
      padding:24px 18px 64px;
      box-shadow:0 6px 18px rgba(20,30,28,.16);
    }
    .foot{left:18px;right:18px;bottom:16px;}

    /* cabeçalho empilha */
    .masthead{flex-direction:column;gap:12px;}
    .masthead .meta{text-align:left;white-space:normal !important;}
    h1{font-size:27px;}

    /* KPIs: 5 colunas → 2 */
    .kpis{grid-template-columns:repeat(2,1fr);}
    .kpi{border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);}
    .kpi:nth-child(2n){border-right:none;}
    .kpi:nth-last-child(-n+1){border-bottom:none;}
    .kpi .value{font-size:26px;}

    /* gráficos lado a lado → empilhados */
    .charts-2,.charts-3{grid-template-columns:1fr;}

    /* tabela detalhada rola na horizontal sem espremer as colunas */
    .table-wrap table{min-width:560px;}

    /* títulos de seção podem quebrar a linha */
    .sec-head h2{white-space:normal;}
  }

  @media (max-width:420px){
    .page{padding:20px 14px 60px;}
    h1{font-size:24px;}
    .kpi .value{font-size:23px;}
    .kpi .value.text{font-size:16px;}
  }

  @media print{
    body{background:none;padding:0;}
    .doc{gap:0;}
    .page{box-shadow:none;margin:0;}
    @page{size:A4;margin:0;}
  }
  /* spinner de carregamento do relatório */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:60vh;font-family:'Hanken Grotesk',-apple-system,sans-serif;}
  .spinner{width:44px;height:44px;border-radius:50%;border:4px solid var(--brand-soft);border-top-color:var(--brand);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading .lbl{font-size:14px;color:var(--ink-soft);}
  </style>
</head>
<body>
  <div class="doc" id="doc">
    <div class="loading"><div class="spinner"></div><div class="lbl" id="spinner-lbl">Gerando relatório…</div></div>
  </div>
  <script type="module">
    import { renderReport, I18N } from './render.js'

    function frLang() {
      try {
        var raw = (location.hash || '').replace(/^#/, '')
        if (raw) { var d = JSON.parse(decodeURIComponent(raw)); if (d && (d.lang === 'en' || d.lang === 'pt')) return d.lang }
      } catch (e) {}
      return (navigator.language || '').toLowerCase().indexOf('pt') === 0 ? 'pt' : 'pt'
    }

    var lang = frLang()
    var T = I18N[lang]
    document.title = T.report_doc_title
    var spinnerLbl = document.getElementById('spinner-lbl')
    if (spinnerLbl) spinnerLbl.textContent = T.generating

    function show(msg) {
      var doc = document.getElementById('doc')
      doc.textContent = ''
      var p = document.createElement('div')
      p.style.cssText = 'padding:40px;font-family:sans-serif;color:#b00020'
      p.textContent = msg
      doc.appendChild(p)
    }
    function build() {
      try {
        const raw = (location.hash || '').replace(/^#/, '')
        if (!raw) { show(T.no_data_fragment) }
        else {
          const data = JSON.parse(decodeURIComponent(raw))
          document.getElementById('doc').innerHTML = renderReport(data)
        }
      } catch (e) { show('Falha ao montar o relatório: ' + e.message) }
    }
    // deixa o spinner pintar antes do render síncrono (que bloqueia a thread)
    requestAnimationFrame(function () { requestAnimationFrame(build) })
  </script>
</body>
</html>
